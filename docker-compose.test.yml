services:
  mysql:
    image: mysql:8.4.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_TEST_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_TEST_DATABASE:-token_monitor_test}
      MYSQL_USER: ${MYSQL_TEST_USER:-token_monitor_test}
      MYSQL_PASSWORD: ${MYSQL_TEST_PASSWORD}
    ports:
      - "${MYSQL_TEST_PORT:-17322}:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s
