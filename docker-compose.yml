services:
  mysql:
    image: mysql:8.4.8
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-token_monitor}
      MYSQL_USER: ${MYSQL_USER:-token_monitor}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - token-monitor-mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  hub:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      TOKEN_MONITOR_PORT: 17321
      TOKEN_MONITOR_HOST: 0.0.0.0
      TOKEN_MONITOR_SECRET: ${TOKEN_MONITOR_SECRET}
      TOKEN_MONITOR_STALE_AFTER_MS: ${TOKEN_MONITOR_STALE_AFTER_MS:-600000}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-token_monitor}
      MYSQL_USER: ${MYSQL_USER:-token_monitor}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TOKSCALE_PRICING_CATALOG_URL: ${TOKSCALE_PRICING_CATALOG_URL:-https://models.dev/api.json}
    ports:
      - "${TOKEN_MONITOR_PORT:-17321}:17321"

volumes:
  token-monitor-mysql:
