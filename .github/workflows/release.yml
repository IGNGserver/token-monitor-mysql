name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the v prefix"
        required: true
        default: "0.31.1"

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run dist:win
      - name: Verify updater artifact names
        run: npm run verify:release-artifact-names
      - uses: actions/upload-artifact@v4
        with:
          name: token-monitor-windows
          if-no-files-found: error
          path: |
            dist/*.exe
            dist/latest.yml
            dist/*.blockmap

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Prepare Android signing key
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 is not configured" >&2
            exit 1
          fi
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/token-monitor-release.jks"
      - name: Build signed Android release
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x android/gradlew
          version="${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}"
          ./android/gradlew --no-daemon -p android assembleRelease \
            -PtokenMonitorVersion="$version" \
            -PandroidKeystorePath="$RUNNER_TEMP/token-monitor-release.jks" \
            -PandroidKeystorePassword="$ANDROID_KEYSTORE_PASSWORD" \
            -PandroidKeyAlias="$ANDROID_KEY_ALIAS" \
            -PandroidKeyPassword="$ANDROID_KEY_PASSWORD"
          cp android/app/build/outputs/apk/release/app-release.apk "android/app/build/outputs/apk/release/Token-Monitor-Android-${version}.apk"
      - uses: actions/upload-artifact@v4
        with:
          name: token-monitor-android
          if-no-files-found: error
          path: android/app/build/outputs/apk/release/Token-Monitor-Android-*.apk

  release:
    needs: [windows, android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref_name }}
          name: Token Monitor ${{ github.event_name == 'workflow_dispatch' && format('v{0}', inputs.version) || github.ref_name }}
          files: |
            artifacts/*.exe
            artifacts/Token-Monitor-Android-*.apk
            artifacts/latest.yml
            artifacts/*.blockmap
          body_path: .github/RELEASE_TEMPLATE.md
