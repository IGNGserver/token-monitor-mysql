name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['22', '24']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - name: Verify vendored worker shared code is in sync
        run: |
          npm run sync:worker
          git diff --exit-code worker/src/shared \
            || { echo "::error::worker/src/shared is stale — run 'npm run sync:worker' and commit."; exit 1; }
      - run: npm run lint
      - run: npm test
